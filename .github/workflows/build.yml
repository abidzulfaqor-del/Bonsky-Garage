name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Scaffold Android project
        run: |
          mkdir -p app/src/main/java/com/bonsky/garage
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/xml
          cp index.html app/src/main/assets/index.html
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "BonskyGarage"
          include ':app'
          EOF
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          EOF
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.bonsky.garage'
              compileSdk 34
              defaultConfig {
                  applicationId "com.bonsky.garage"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { release { minifyEnabled false } }
              dependencies {
                  implementation 'androidx.core:core:1.12.0'
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:label="@string/app_name"
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="com.bonsky.garage.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths"/>
                  </provider>
              </application>
          </manifest>
          EOF
          cat > app/src/main/java/com/bonsky/garage/MainActivity.java << 'EOF'
          package com.bonsky.garage;

          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.print.PrintManager;
          import android.util.Base64;
          import android.webkit.JavascriptInterface;
          import android.webkit.WebChromeClient;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.webkit.WebViewClient;
          import androidx.core.content.FileProvider;
          import java.io.File;
          import java.io.FileOutputStream;

          public class MainActivity extends Activity {
              private WebView web;

              class BonskyInterface {
                  @JavascriptInterface
                  public void printPage() {
                      runOnUiThread(new Runnable() {
                          public void run() {
                              PrintManager pm = (PrintManager) getSystemService(PRINT_SERVICE);
                              if (pm != null) {
                                  pm.print("Bonsky Garage",
                                      web.createPrintDocumentAdapter("Bonsky Garage"), null);
                              }
                          }
                      });
                  }

                  @JavascriptInterface
                  public void shareText(final String text) {
                      runOnUiThread(new Runnable() {
                          public void run() {
                              Intent i = new Intent(Intent.ACTION_SEND);
                              i.setType("text/plain");
                              i.putExtra(Intent.EXTRA_TEXT, text);
                              startActivity(Intent.createChooser(i, "Bagikan via"));
                          }
                      });
                  }

                  @JavascriptInterface
                  public void openPDF(final String dataUri, final String filename) {
                      runOnUiThread(new Runnable() {
                          public void run() {
                              try {
                                  String base64 = dataUri.replaceAll("^data:application/pdf;base64,", "");
                                  byte[] bytes = Base64.decode(base64, Base64.DEFAULT);
                                  File file = new File(getCacheDir(), filename);
                                  FileOutputStream fos = new FileOutputStream(file);
                                  fos.write(bytes);
                                  fos.close();
                                  Uri uri = FileProvider.getUriForFile(
                                      MainActivity.this,
                                      "com.bonsky.garage.fileprovider",
                                      file);
                                  Intent i = new Intent(Intent.ACTION_SEND);
                                  i.setType("application/pdf");
                                  i.putExtra(Intent.EXTRA_STREAM, uri);
                                  i.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                                  startActivity(Intent.createChooser(i, "Bagikan PDF via"));
                              } catch (Exception e) {
                                  e.printStackTrace();
                              }
                          }
                      });
                  }
              }

              @Override
              protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  web = new WebView(this);
                  WebSettings set = web.getSettings();
                  set.setJavaScriptEnabled(true);
                  set.setDomStorageEnabled(true);
                  web.setWebChromeClient(new WebChromeClient());
                  web.setWebViewClient(new WebViewClient());
                  web.addJavascriptInterface(new BonskyInterface(), "Android");
                  web.loadUrl("file:///android_asset/index.html");
                  setContentView(web);
              }

              @Override
              public void onBackPressed() {
                  if (web.canGoBack()) web.goBack();
                  else super.onBackPressed();
              }
          }
          EOF
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Bonsky Garage</string>
          </resources>
          EOF
          cat > app/src/main/res/drawable/ic_launcher_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="rectangle">
              <solid android:color="#15181B"/>
          </shape>
          EOF
          cat > app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <group android:scaleX="3.2" android:scaleY="3.2" android:translateX="15.6" android:translateY="15.6">
                  <path android:fillColor="#F5A623"
                      android:pathData="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65A.488.488 0 0 0 13.6 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5z"/>
              </group>
          </vector>
          EOF
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

          cat > app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <cache-path name="cache" path="." />
          </paths>
          EOF

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BonskyGarage-APK
          path: app/build/outputs/apk/debug/app-debug.apk
